server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: notification-service
  config:
    import: "configserver:http://localhost:8888,optional:file:.env[.properties],optional:file:../../.env[.properties]"
  cloud:
    config:
      fail-fast: true
  datasource:
    url: ${NOTIFICATION_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

security:
  jwt:
    issuer: ${JWT_ISSUER:volunteer-user-service}
    secret: ${JWT_SECRET:}
