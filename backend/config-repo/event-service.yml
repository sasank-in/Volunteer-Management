server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: ${EVENT_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:15}
      minimum-idle: ${DB_POOL_MIN:3}
      connection-timeout: 5000
      validation-timeout: 2000
      idle-timeout: 300000
      max-lifetime: 1800000
      leak-detection-threshold: 30000
      pool-name: event-service-pool
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      jakarta:
        persistence:
          query:
            timeout: 5000
      hibernate:
        jdbc:
          batch_size: 25
          fetch_size: 100
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB
  cache:
    type: simple
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

app:
  cache:
    type: ${APP_CACHE_TYPE:in-memory}
  sync:
    internal-token: ${USER_SYNC_TOKEN:dev-sync-token}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
  storage:
    # Swap to s3 / gcs etc. once a corresponding FileStorage bean exists.
    type: ${EVENT_STORAGE_TYPE:local}
    local:
      root: ${EVENT_STORAGE_LOCAL_ROOT:./uploads}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    hostname: localhost
    prefer-ip-address: false

security:
  jwt:
    issuer: ${JWT_ISSUER:volunteer-user-service}
    secret: ${JWT_SECRET:}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8080}
  internal:
    token: ${NOTIFICATION_INTERNAL_TOKEN:dev-notify-token}
  outbox:
    max-attempts: ${NOTIFICATION_OUTBOX_MAX_ATTEMPTS:5}
    retry-delay-ms: ${NOTIFICATION_OUTBOX_RETRY_DELAY_MS:60000}
  reminder:
    hours-before: ${NOTIFICATION_REMINDER_HOURS_BEFORE:24}
    check-interval-ms: ${NOTIFICATION_REMINDER_CHECK_INTERVAL_MS:900000}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      notification-service:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      default:
        register-health-indicator: true
        limit-for-period: 100
        limit-refresh-period: 1m

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:event-service}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
