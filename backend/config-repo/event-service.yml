server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: ${EVENT_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    hostname: localhost
    prefer-ip-address: false

security:
  jwt:
    issuer: ${JWT_ISSUER:volunteer-user-service}
    secret: ${JWT_SECRET:}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8080}
  internal:
    token: ${NOTIFICATION_INTERNAL_TOKEN:dev-notify-token}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
