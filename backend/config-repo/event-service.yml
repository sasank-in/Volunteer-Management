server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: ${EVENT_DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  cache:
    type: simple

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
  instance:
    hostname: localhost
    prefer-ip-address: false

security:
  jwt:
    issuer: ${JWT_ISSUER:volunteer-user-service}
    secret: ${JWT_SECRET:}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:8080}
  internal:
    token: ${NOTIFICATION_INTERNAL_TOKEN:dev-notify-token}
  outbox:
    max-attempts: ${NOTIFICATION_OUTBOX_MAX_ATTEMPTS:5}
    retry-delay-ms: ${NOTIFICATION_OUTBOX_RETRY_DELAY_MS:60000}
  reminder:
    hours-before: ${NOTIFICATION_REMINDER_HOURS_BEFORE:24}
    check-interval-ms: ${NOTIFICATION_REMINDER_CHECK_INTERVAL_MS:900000}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      notification-service:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
  ratelimiter:
    instances:
      default:
        register-health-indicator: true
        limit-for-period: 100
        limit-refresh-period: 1m

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
