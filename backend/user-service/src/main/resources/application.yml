server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
  config:
    import: "configserver:http://localhost:8888,optional:file:.env[.properties],optional:file:../../.env[.properties]"
  cloud:
    config:
      fail-fast: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

security:
  jwt:
    issuer: ${JWT_ISSUER:volunteer-user-service}
    secret: ${JWT_SECRET:}
    expires-in: ${JWT_EXPIRES_IN:3600}
    refresh-expires-in: ${JWT_REFRESH_EXPIRES_IN:604800}
