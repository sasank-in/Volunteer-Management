server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: config-server
  config:
    import: "optional:file:.env[.properties],optional:file:../../.env[.properties]"
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # Config Server is started from repo root per docs; point to backend/config-repo
          search-locations: file:./backend/config-repo,file:../config-repo

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info
