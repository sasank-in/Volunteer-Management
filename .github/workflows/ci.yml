name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel in-flight runs of the same workflow on the same ref so PR pushes
# don't queue up redundant builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Java 21 — build + unit tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # `mvn test` runs Surefire (unit tests) but skips Failsafe (*IT.java
      # integration tests need Docker). Use `verify -DskipITs` if we ever
      # need a stricter run that still excludes integration tests.
      - name: Build and run unit tests
        working-directory: backend
        run: mvn -B -ntp -DskipITs verify

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/**/target/surefire-reports/
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend (Node 20 — typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs `tsc -b && vite build`, so this single step
      # catches both type errors and bundle errors.
      - name: Typecheck and build
        run: npm run build

      - name: Upload bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: frontend/dist/
          if-no-files-found: ignore
          retention-days: 3
